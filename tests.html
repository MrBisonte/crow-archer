<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CROW ARCHER — tests</title>
<style>
  body { background:#0a140a; color:#39FF14; font:13px monospace; padding:16px; }
  .pass::before { content:'PASS  '; color:#39FF14; }
  .fail::before { content:'FAIL  '; color:#FF1F1F; }
  .fail { color:#FF1F1F; }
  h1 { font-size:16px; margin-bottom:12px; }
  #summary { margin-top:12px; font-weight:bold; }
</style>
</head>
<body>
<h1>CROW ARCHER — unit tests</h1>
<div id="out"></div>
<div id="summary">loading game.html…</div>
<!-- The classes under test live in game.html; load it same-origin and read the
     internals it exposes. The running game loop does not touch our fresh
     instances. -->
<iframe src="game.html" style="display:none" onload="runTests(this)"></iframe>
<script>
let passed = 0, failed = 0;
const out = document.getElementById('out');
function check(name, cond) {
  const d = document.createElement('div');
  d.className = cond ? 'pass' : 'fail';
  d.textContent = name;
  out.appendChild(d);
  cond ? passed++ : failed++;
}

function runTests(frame) {
  const { TILE, TileMap, PathScheduler, FovMap } = frame.contentWindow.CrowArcherInternals;

  // ── TileMap ────────────────────────────────────────────────────────────────
  {
    const m = new TileMap(4, 4);
    let events = [];
    m.onChange((r, c, oldT, newT) => events.push([r, c, oldT, newT]));
    m.set(1, 1, TILE.ROCK);
    check('TileMap.set fires onChange with old and new tile',
      events.length === 1 && events[0][0] === 1 && events[0][1] === 1 &&
      events[0][2] === TILE.EMPTY && events[0][3] === TILE.ROCK);
    check('TileMap.get returns the set tile', m.get(1, 1) === TILE.ROCK);

    events = [];
    m.set(1, 1, TILE.ROCK);
    check('TileMap.set to the same tile is a no-op (no event)', events.length === 0);

    m.set(-1, 0, TILE.ROCK); m.set(0, 99, TILE.ROCK);
    check('TileMap.set ignores out-of-bounds', events.length === 0);

    let resets = 0;
    m.onReset(() => resets++);
    m.reset(Array.from({ length: 4 }, () => new Array(4).fill(TILE.WATER)));
    check('TileMap.reset fires onReset and swaps the grid',
      resets === 1 && m.get(3, 3) === TILE.WATER);
  }

  // ── PathScheduler ────────────────────────────────────────────────────────────
  {
    let computes = 0;
    const fakeCompute = () => { computes++; return [{ x: 1, y: 1 }]; };
    const s = new PathScheduler(fakeCompute, { budget: 3, interval: 0.4 });
    const crows = Array.from({ length: 10 }, () => ({ state: 'aggro' }));
    crows.forEach(c => s.request(c));
    check('PathScheduler.request enqueues each crow once', s._queue.length === 10);

    crows.forEach(c => s.request(c));
    check('PathScheduler.request is idempotent per crow', s._queue.length === 10);

    s.serve(0, 0);
    check('PathScheduler.serve honors the per-frame budget', computes === 3);
    check('PathScheduler.serve leaves the rest queued', s._queue.length === 7);

    // FIFO: the first three requested are the ones served
    check('PathScheduler serves FIFO (no starvation)',
      crows[0].path && crows[1].path && crows[2].path && !crows[3].path);

    // A crow that dropped aggro while queued is skipped without a compute
    computes = 0;
    const s2 = new PathScheduler(fakeCompute, { budget: 5 });
    const a = { state: 'aggro' }, b = { state: 'passive' };
    s2.request(a); s2.request(b); s2.serve(0, 0);
    check('PathScheduler.serve skips crows that stopped being aggro', computes === 1);

    const phases = new Set();
    for (let i = 0; i < 50; i++) phases.add(s.initialPhase());
    check('PathScheduler.initialPhase spreads across the interval',
      phases.size > 40 && Math.max(...phases) < 0.4 && Math.min(...phases) >= 0);
  }

  // ── FovMap ─────────────────────────────────────────────────────────────────
  {
    // Fake compute marks a 3x3 block around (col, row)
    const fake = (col, row, mark) => {
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++) mark(col + dc, row + dr);
    };
    let calls = 0;
    const f = new FovMap(10, 10, (col, row, mark) => { calls++; fake(col, row, mark); });
    f.update(5, 5);
    check('FovMap marks the computed cells visible',
      f.isVisible(5, 5) && f.isVisible(4, 4) && f.isVisible(6, 6));
    check('FovMap reports uncomputed cells as not visible', !f.isVisible(0, 0));
    check('FovMap.isVisible bounds-checks', !f.isVisible(-1, 5) && !f.isVisible(5, 99));

    f.update(5, 5);
    check('FovMap.update skips recompute when the tile is unchanged', calls === 1);

    f.update(2, 2);
    check('FovMap.update recomputes on a new tile and clears stale cells',
      calls === 2 && f.isVisible(2, 2) && !f.isVisible(6, 6));

    f.invalidate();
    check('FovMap.invalidate clears visibility and forces recompute',
      !f.isVisible(2, 2) && f.tile[0] === -1);
  }

  const s = document.getElementById('summary');
  s.textContent = `${passed} passed, ${failed} failed`;
  s.className = failed ? 'fail' : 'pass';
}
</script>
</body>
</html>
