<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>CROW ARCHER — UI Kit</title>
<style>
  html, body {
    margin: 0;
    background: #000;
    color: #39FF14;
    font: 12px ui-monospace, "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
    overflow: hidden;
    height: 100%;
  }
  .stage {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
  }
  .frame {
    position: relative;
    width: 800px;
    height: 544px;
    box-shadow:
      0 0 0 1px #196407,
      0 0 24px rgba(57, 255, 20, 0.20),
      0 0 80px rgba(57, 255, 20, 0.08);
  }
  canvas { display: block; image-rendering: pixelated; }
  .help {
    position: absolute;
    left: 0; right: 0;
    bottom: -42px;
    text-align: center;
    color: #196407;
    letter-spacing: 1px;
    font-size: 10px;
    text-transform: uppercase;
    user-select: none;
  }
  .help kbd {
    color: #39FF14;
    text-shadow: 0 0 4px #39FF14;
    padding: 0 2px;
    border: 1px solid #196407;
    border-radius: 0;
    font: inherit;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="frame">
    <canvas id="game" width="800" height="544"></canvas>
    <div class="help">
      <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> MOVE &nbsp;
      <kbd>MOUSE</kbd> AIM &nbsp;
      <kbd>LMB</kbd> CHARGE+FIRE &nbsp;
      <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd> MODE &nbsp;
      <kbd>SPACE</kbd> PITCHFORK &nbsp;
      <kbd>E</kbd> DYNAMITE &nbsp;
      <kbd>B</kbd> BOSS &nbsp;
      <kbd>H</kbd> LOW-HP &nbsp;
      <kbd>R</kbd> RESET
    </div>
  </div>
</div>
<script src="../../preview/_lib.js"></script>
<script src="game-loop.js"></script>
</body>
</html>
