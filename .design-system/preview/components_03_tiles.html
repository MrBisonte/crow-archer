<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/>
</head><body>
<div class="card" style="height:90px;">
  <i class="corner tl"></i><i class="corner tr"></i><i class="corner bl"></i><i class="corner br"></i>
  <div class="label">TILES — EXISTING (REFERENCE)</div>
  
  <canvas id="c" width="700" height="90"></canvas>
  
</div>
<script src="_lib.js"></script>
<script>

const A = window.CrowArcher;
A.runCard(c, (ctx,{loopT}) => {
  const labels = ['EMPTY', 'ROCK', 'WATER', 'TREE'];
  const xs = [80, 230, 380, 530];
  A.drawGroundTile(ctx, xs[0]-16, 22);
  A.drawRockTile(ctx, xs[1]-16, 22);
  A.drawWaterTile(ctx, xs[2]-16, 22, loopT);
  A.drawTreeTile(ctx, xs[3]-16, 22, loopT);
  ctx.fillStyle = '#39FF14';
  ctx.shadowColor = '#39FF14'; ctx.shadowBlur = 3;
  ctx.font = '10px ui-monospace, monospace';
  ctx.textAlign = 'center';
  for (let i = 0; i < 4; i++) ctx.fillText(labels[i], xs[i], 76);
  ctx.shadowBlur = 0;
});

</script>
</body></html>
