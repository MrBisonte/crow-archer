<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/>
</head><body>
<div class="card" style="height:130px;">
  <i class="corner tl"></i><i class="corner tr"></i><i class="corner bl"></i><i class="corner br"></i>
  <div class="label">ARROW + PLAYER</div>
  
  <canvas id="c" width="700" height="130"></canvas>
  
</div>
<script src="_lib.js"></script>
<script>

const A = window.CrowArcher;
const sw = [
  ['ARR-SHAFT',  '#D4A832'],
  ['ARR-HEAD',   '#F0C830'],
  ['ARR-FLETCH', '#A07828'],
  ['P-BODY',     '#3A5F88'],
  ['P-SKIN',     '#D9B98A'],
  ['P-HAT',      '#0E1410'],
];
A.runCard(c, (ctx,{loopT}) => {
  let x = 14;
  for (const [n,v] of sw) {
    ctx.fillStyle = v;
    ctx.fillRect(x, 30, 60, 50);
    ctx.strokeStyle = '#39FF14';
    ctx.lineWidth = 1;
    ctx.strokeRect(x+0.5, 30.5, 60, 50);
    ctx.fillStyle = '#39FF14';
    ctx.font = '9px ui-monospace, monospace';
    ctx.shadowColor = '#39FF14'; ctx.shadowBlur=3;
    ctx.fillText(n, x, 96);
    ctx.shadowBlur=0;
    ctx.fillStyle = '#28B30E';
    ctx.fillText(v, x, 110);
    x += 112;
  }
}, { post: true });

</script>
</body></html>
