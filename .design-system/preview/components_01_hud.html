<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/>
</head><body>
<div class="card" style="height:80px;">
  <i class="corner tl"></i><i class="corner tr"></i><i class="corner bl"></i><i class="corner br"></i>
  <div class="label">HUD — 32PX TOP STRIP</div>
  
  <canvas id="c" width="700" height="80"></canvas>
  
</div>
<script src="_lib.js"></script>
<script>

const A = window.CrowArcher;
A.runCard(c, (ctx,{loopT}) => {
  // HUD bar
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 14, 700, 32);
  // phosphor separator line
  ctx.strokeStyle = '#39FF14'; ctx.lineWidth = 2;
  ctx.shadowColor = '#39FF14'; ctx.shadowBlur = 4;
  ctx.beginPath();
  ctx.moveTo(0, 46.5); ctx.lineTo(700, 46.5);
  ctx.stroke();
  ctx.shadowBlur = 4;
  ctx.fillStyle = '#39FF14';
  ctx.font = '12px ui-monospace, monospace';
  ctx.letterSpacing = '2px';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  // Low HP pulse
  const lowPulse = 0.6 + 0.4*Math.sin(loopT*6);
  ctx.fillStyle = 'rgba(255,31,31,' + lowPulse + ')';
  ctx.shadowColor = '#FF1F1F';
  ctx.fillText('HP 01/05', 14, 30);
  ctx.fillStyle = '#39FF14';
  ctx.shadowColor = '#39FF14';
  ctx.fillText('ARROWS x07', 130, 30);
  ctx.fillText('WAVE 04', 270, 30);
  ctx.fillText('SCORE 01240', 390, 30);
  // MODE badge
  ctx.strokeStyle = '#39FF14';
  ctx.lineWidth = 1;
  ctx.strokeRect(556.5, 22.5, 56, 16);
  ctx.fillText('RICOCHET', 562, 30);
  ctx.shadowBlur = 0;
  // labels below
  ctx.fillStyle = '#196407';
  ctx.font = '9px ui-monospace, monospace';
  ctx.shadowBlur = 0;
  ctx.fillText('LOW-HP PULSE       NORMAL       NORMAL       NORMAL       MODE BADGE', 14, 65);
}, { post: true });

</script>
</body></html>
