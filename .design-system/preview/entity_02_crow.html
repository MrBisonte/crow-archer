<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/>
</head><body>
<div class="card" style="height:160px;">
  <i class="corner tl"></i><i class="corner tr"></i><i class="corner bl"></i><i class="corner br"></i>
  <div class="label">02. CROW (NORMAL)</div>
  
  <canvas id="c" width="700" height="160"></canvas>
  
</div>
<script src="_lib.js"></script>
<script>

const A = window.CrowArcher;
A.runCard(c, (ctx,{loopT}) => {
  // a flock with decorrelated phases
  const positions = [
    {x: 100, y: 80, p: 0},
    {x: 220, y: 90, p: 1.2},
    {x: 340, y: 70, p: 2.4},
    {x: 460, y: 95, p: 3.6},
    {x: 580, y: 75, p: 4.8},
  ];
  for (const c of positions) {
    A.drawCrow(ctx, c.x, c.y, { wingPhase: loopT*12 + c.p, entityPhase: c.p, loopT, facing: -1 });
  }
  ctx.fillStyle = '#39FF14';
  ctx.shadowColor = '#39FF14'; ctx.shadowBlur = 3;
  ctx.font = '10px ui-monospace, monospace';
  ctx.textAlign = 'center';
  ctx.fillText('WING FREQ 12/s    BODY BOB 0.8 PX    AMBER EYE + RED GLINT', 350, 135);
  ctx.shadowBlur = 0;
});

</script>
</body></html>
