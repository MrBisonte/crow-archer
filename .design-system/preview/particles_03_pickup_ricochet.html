<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/>
</head><body>
<div class="card" style="height:150px;">
  <i class="corner tl"></i><i class="corner tr"></i><i class="corner bl"></i><i class="corner br"></i>
  <div class="label">PARTICLES — PICKUP RICOCHET</div>
  
  <canvas id="c" width="700" height="150"></canvas>
  
</div>
<script src="_lib.js"></script>
<script>

const A = window.CrowArcher;
const ps = new A.Particles();
let next = 0;
A.runCard(c, (ctx,{loopT,dt}) => {
  next -= dt;
  if (next <= 0) {
    ps.burst(350, 70, {
      shape: 'spark',
      colors: ['#39E0FF','#7AF0FF','#FFFFFF'],
      count: 12,
      speedMin: 80, speedMax: 160,
      decay: 2.2,
      ringTight: true,
      shadowBlur: 6,
    });
    next = 0.7;
  }
  ps.update(dt); ps.draw(ctx);
  ctx.fillStyle = '#39FF14';
  ctx.shadowColor = '#39FF14'; ctx.shadowBlur = 3;
  ctx.font = '10px ui-monospace, monospace';
  ctx.textAlign = 'center';
  ctx.fillText('12 SPARKS    RING-TIGHT EMISSION    DECAY 2.2', 350, 130);
  ctx.shadowBlur = 0;
});

</script>
</body></html>
