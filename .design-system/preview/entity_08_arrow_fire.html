<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/>
</head><body>
<div class="card" style="height:130px;">
  <i class="corner tl"></i><i class="corner tr"></i><i class="corner bl"></i><i class="corner br"></i>
  <div class="label">08. ARROW (FIRE)</div>
  
  <canvas id="c" width="700" height="130"></canvas>
  
</div>
<script src="_lib.js"></script>
<script>

const A = window.CrowArcher;
const ps = new A.Particles();
let lastEmit = 0;
A.runCard(c, (ctx,{loopT,dt}) => {
  const x = 100 + ((loopT*180) % 500);
  const y = 60;
  const ang = 0;
  // continuous trail emission
  lastEmit += dt;
  while (lastEmit > 0.03) {
    ps.burst(x - 12, y, {
      shape: 'circle',
      colors: ['#FF7A1F','#FFB400','#FFFFFF'],
      count: 1,
      speedMin: 0, speedMax: 20,
      decay: 3.0,
      sizeMin: 1.5, sizeMax: 2.5,
      gravity: -40,
      shadowBlur: 8,
    });
    lastEmit -= 0.03;
  }
  ps.update(dt); ps.draw(ctx);
  A.drawArrowFire(ctx, x, y, ang, { loopT, fireSeed: 0 });
  ctx.fillStyle = '#39FF14';
  ctx.shadowColor = '#39FF14'; ctx.shadowBlur = 3;
  ctx.font = '10px ui-monospace, monospace';
  ctx.textAlign = 'center';
  ctx.fillText('REAR FLAME ELLIPSES    CONTINUOUS TRAIL (1 / 0.03s)    BLUR 6–12', 350, 110);
  ctx.shadowBlur = 0;
});

</script>
</body></html>
